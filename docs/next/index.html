<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>freym — next: curated AI works with full prompts</title>
<meta name="description" content="next — a curated gallery of AI works, each with the complete prompt behind it." />
<style>
  :root {
    --bg: #f5f4ee;
    --ink: #111110;
    --muted: #6f6d66;
    --line: #e4e2d8;
    --card: #ffffff;
    --accent: #ff4d00;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 40px;
  }
  .wordmark { font-weight: 700; font-size: 19px; letter-spacing: -0.02em; }
  .wordmark span { color: var(--accent); }
  .hdr-right { font-size: 14px; color: var(--muted); }

  .hero { text-align: center; padding: 84px 24px 48px; }
  .hero h1 {
    font-size: clamp(38px, 6vw, 68px);
    font-weight: 500; letter-spacing: -0.03em; line-height: 1.05;
    max-width: 800px; margin: 0 auto;
  }
  .hero p { margin-top: 20px; font-size: 17px; color: var(--muted); }

  .filters {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    padding: 26px 24px 8px; position: sticky; top: 0; z-index: 5;
    background: linear-gradient(var(--bg) 75%, transparent);
  }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--line); background: var(--card);
    border-radius: 999px; padding: 8px 16px; font-size: 14px;
    cursor: pointer; transition: all .15s ease; user-select: none;
  }
  .pill:hover { border-color: var(--ink); }
  .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .grid {
    columns: 4 260px; column-gap: 14px;
    max-width: 1280px; margin: 26px auto 80px; padding: 0 24px;
  }
  .card {
    break-inside: avoid; margin-bottom: 14px; position: relative;
    border-radius: 12px; overflow: hidden; background: var(--card);
    border: 1px solid var(--line); cursor: pointer;
  }
  .card img { width: 100%; display: block; }
  .card .who {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 26px 12px 10px; font-size: 13px; color: #fff;
    background: linear-gradient(transparent, rgba(0,0,0,.55));
    opacity: 0; transition: opacity .15s ease;
  }
  .card:hover .who { opacity: 1; }

  /* overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: rgba(20,20,18,.5); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--bg); border-radius: 16px; overflow: hidden;
    display: flex; max-width: 1060px; width: 100%; max-height: 90vh;
    position: relative;
  }
  .sheet .left { flex: 1.2; background: #0d0d0c; position: relative; min-width: 0; overflow-y: auto; }
  .sheet .left .imgs {
    min-height: 100%; display: flex; flex-direction: column; gap: 8px;
    align-items: center; justify-content: center;
  }
  .sheet .left img { max-width: 100%; display: block; }
  .sheet .left .imgs.single img { max-height: 90vh; object-fit: contain; }
  .sheet .right {
    flex: 1; padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px;
    min-width: 320px;
  }
  .work-title { font-weight: 600; font-size: 18px; letter-spacing: -0.01em; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12px; border: 1px solid var(--line); background: var(--card);
    padding: 4px 10px; border-radius: 999px; color: var(--muted);
  }
  .chip.model { color: var(--ink); font-weight: 600; }
  .prompt-box {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; font-size: 14px; line-height: 1.55; white-space: pre-wrap;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #2a2a27;
  }
  .label { font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--ink); color: var(--bg); border: none; cursor: pointer;
    border-radius: 999px; padding: 10px 18px; font-size: 14px; font-weight: 500;
    width: fit-content; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .close-x {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    background: rgba(255,255,255,.9); border: none; width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer; font-size: 15px;
  }
  footer { text-align: center; padding: 40px; font-size: 13px; color: var(--muted); }
  .loading { text-align: center; color: var(--muted); padding: 60px; }
  @media (max-width: 760px) {
    .sheet { flex-direction: column; overflow-y: auto; }
    .sheet .left { overflow: visible; }
    .sheet .left .imgs.single img { max-height: 46vh; }
    header { padding: 18px 20px; }
  }
</style>
</head>
<body>

<header>
  <a class="wordmark" href="/">freym<span>.</span></a>
  <div class="hdr-right" id="stats"></div>
</header>

<section class="hero">
  <h1>next.</h1>
  <p>A curated gallery of AI works — every one with the complete prompt behind it.</p>
</section>

<div class="filters" id="filters"></div>
<div class="grid" id="grid"><div class="loading">Loading gallery…</div></div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<footer><a href="/">← back to the freym feed</a></footer>

<script>
const FEED_URL = "https://lmuksetmkzssoewkzdlm.supabase.co/functions/v1/scraper-feed?creator=nextunyte";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtdWtzZXRta3pzc29ld2t6ZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyNTUwNTMsImV4cCI6MjA3NzgzMTA1M30.mvX1o1RBSDgfX5OwRu3ArxsTxQzeZ5ah6J0aR2ZwNuk";

let DATA = { creators: [], posts: [] };
let filterModel = null;

const $ = (s) => document.querySelector(s);
const esc = (s) => (s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

async function load() {
  const res = await fetch(FEED_URL, { headers: { Authorization: "Bearer " + ANON_KEY } });
  DATA = await res.json();
  DATA.posts = DATA.posts.filter((p) => (p.sc_images ?? []).length);
  DATA.posts.forEach((p) => p.sc_images.sort((a, b) => a.position - b.position));
  renderFilters();
  renderGrid();
  $("#stats").textContent = `${DATA.posts.length} works · full prompts`;
}

function renderFilters() {
  const el = $("#filters");
  el.innerHTML = "";
  const all = pill("All", filterModel === null);
  all.onclick = () => { filterModel = null; renderFilters(); renderGrid(); };
  el.appendChild(all);

  const counts = {};
  for (const p of DATA.posts) if (p.model_name) counts[p.model_name] = (counts[p.model_name] ?? 0) + 1;
  const models = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  for (const m of models) {
    const pl = pill(m, filterModel === m);
    pl.onclick = () => { filterModel = filterModel === m ? null : m; renderFilters(); renderGrid(); };
    el.appendChild(pl);
  }
}

function pill(text, active) {
  const d = document.createElement("div");
  d.className = "pill" + (active ? " active" : "");
  d.textContent = text;
  return d;
}

function renderGrid() {
  const grid = $("#grid");
  grid.innerHTML = "";
  const posts = DATA.posts.filter((p) => !filterModel || p.model_name === filterModel);
  if (!posts.length) { grid.innerHTML = '<div class="loading">Nothing here yet.</div>'; return; }
  for (const p of posts) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${esc(p.sc_images[0].url)}" loading="lazy" referrerpolicy="no-referrer" alt="${esc(p.caption ?? "")}">
      ${p.caption ? `<div class="who">${esc(p.caption)}</div>` : ""}`;
    card.onclick = () => openPost(p);
    grid.appendChild(card);
  }
}

let currentPost = null;

function openPost(p) {
  currentPost = p;
  renderSheet();
  $("#overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function renderSheet() {
  const p = currentPost;
  const tags = (p.style_tags ?? []).filter((t) => t !== "nextunyte").map((t) => `<span class="chip">${esc(t)}</span>`).join("");
  const imgs = p.sc_images.map((im) => `<img src="${esc(im.url)}" referrerpolicy="no-referrer" alt="">`).join("");
  $("#sheet").innerHTML = `
    <button class="close-x" onclick="closeOverlay()">✕</button>
    <div class="left">
      <div class="imgs${p.sc_images.length === 1 ? " single" : ""}">${imgs}</div>
    </div>
    <div class="right">
      ${p.caption ? `<div class="work-title">${esc(p.caption)}</div>` : ""}
      <div class="chips">
        ${p.model_name ? `<span class="chip model">${esc(p.model_name)}</span>` : ""}
        ${tags}
      </div>
      ${p.prompt_text
        ? `<div><div class="label">Prompt</div><div class="prompt-box">${esc(p.prompt_text)}</div></div>
           <button class="btn" onclick="copyPrompt(this)">Copy prompt</button>`
        : ""}
    </div>`;
}

function copyPrompt(btn) {
  navigator.clipboard.writeText(currentPost.prompt_text ?? "").then(() => {
    btn.textContent = "Copied ✓";
    setTimeout(() => (btn.textContent = "Copy prompt"), 1500);
  });
}

function closeOverlay() {
  $("#overlay").classList.remove("open");
  document.body.style.overflow = "";
}
$("#overlay").addEventListener("click", (e) => { if (e.target === e.currentTarget) closeOverlay(); });
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeOverlay();
});

load().catch((e) => { $("#grid").innerHTML = `<div class="loading">Failed to load: ${esc(String(e))}</div>`; });
</script>
</body>
</html>
